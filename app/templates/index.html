<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Sentiment Analysis</h1>
        <form method="POST">
            <textarea name="review_text" placeholder="Enter your review here..." required></textarea><br>
            <button type="submit">Analyze Sentiment</button>
        </form>

        {% if sentiment %}
            <div class="result {% if sentiment == 'Positive' %}positive{% elif sentiment == 'Negative' %}negative{% else %}neutral{% endif %}">
                <p>Predicted Sentiment: <strong>{{ sentiment }}</strong></p>
            </div>
        {% endif %}
    </div>

</body>
</html>
